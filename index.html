function showLogin(err){
  closeDrawer(); $('#sidebar').style.display='none'; $('#bottomnav').style.display='none';
  $('#main').innerHTML=`<div style="max-width:330px;margin:11vh auto 0;text-align:center;padding:20px">
    <img src="${LOGO_IMG}" alt="Beatriz Calabuig" style="max-width:250px;width:82%">
    <div class="card" style="text-align:left;margin-top:22px">
      <div class="field" style="margin-bottom:10px"><label>Contraseña de acceso</label>
        <input class="inp" id="lg_pw" type="password" autocomplete="current-password" autofocus></div>
      <div id="lg_err" style="color:var(--red);font-size:12px;margin-bottom:8px;min-height:14px">${err?esc(err):''}</div>
      <button class="btn primary lg" id="lg_btn" style="width:100%">Entrar</button>
    </div>
    <div class="muted" style="font-size:11px;margin-top:16px">Logopedia · acceso privado</div>
  </div>`;
  const go=async()=>{
    const pw=$('#lg_pw').value.trim(); if(!pw) return;
    const b=$('#lg_btn'); b.disabled=true; b.textContent='Entrando…';
    try{ await DB.login(pw); $('#sidebar').style.display=''; $('#bottomnav').style.display=''; seedHolidaysValencia(); App.navigate('dashboard'); toast('Sesión iniciada','ok'); }
    catch(e){ b.disabled=false; b.textContent='Entrar'; showLogin('Contraseña incorrecta'); }
  };
  $('#lg_btn').onclick=go;
  $('#lg_pw').onkeydown=e=>{ if(e.key==='Enter') go(); };
}

/* ---------- Formulario público de alta (familias) ---------- */
function brandImg(w){ return `<img src="${LOGO_IMG}" alt="${esc(Config.get().clinic_name||'')}" style="max-width:${w||220}px;width:80%">`; }
/* ============================================================
   ANAMNESIS / Cuestionario inicial (config compartida)
   ============================================================ */
const FAMILY_MEMBERS=[['madre','Madre'],['padre','Padre'],['h1','Hermano/a 1'],['h2','Hermano/a 2'],['h3','Hermano/a 3'],['otros','Otros familiares']];
const FAMILY_ROWS=[['nombre','Nombre'],['edad','Edad'],['prof','Profesión / curso'],['ant','Antecedentes']];
const ANAMNESIS=[
  {t:'Motivo de consulta', f:[['mc_preocupa','¿Qué le preocupa?'],['mc_piensa','¿Qué cree que piensa su hijo/a de esto?'],['mc_hablado','¿Han hablado directamente con él/ella de esto?']]},
  {t:'Datos médicos relevantes', f:[['med_vista','Problemas de vista'],['med_oido','Problemas de oído'],['med_enf','Enfermedades relevantes'],['med_cir','Intervenciones quirúrgicas'],['med_farm','Tratamiento farmacológico'],['med_alerg','Alergias']]},
  {t:'Desarrollo evolutivo', f:[['ev_andar','¿A qué edad comenzó a andar?'],['ev_patoso','¿Considera a su hijo/a patoso/a?'],['ev_lat','¿Es diestro/a o zurdo/a?'],['ev_tardo','¿Tardó en hablar?'],['ev_pron','¿Se le entendía o pronunciaba mal?']]},
  {t:'Idiomas', f:[['id_casa','¿En qué lengua se comunican en casa?'],['id_cole','¿En qué lengua se comunican en el colegio?']]},
  {t:'Entorno escolar', f:[['esc_atencion','¿Pierde la atención con frecuencia?'],['esc_sospecha','¿Sospecha de problemas atencionales en el colegio?'],['esc_rend','¿En qué áreas obtiene mejor y peor rendimiento?'],['esc_apoyo','¿Recibe apoyo o adaptación en el colegio?'],['esc_vision','¿Qué visión cree que tiene el colegio de su hijo/a?'],['esc_contento','¿Va contento/a al colegio? ¿Se siente bien allí?']]},
  {t:'Otros profesionales', f:[['op_gab','¿Ha visitado antes psicología/psicopedagogía/logopedia?'],['op_inf','¿Le han emitido algún informe psicopedagógico o logopédico?']]},
];
function anamnesisFormHTML(){
  let h='<div class="sec-title" style="margin-top:16px">Datos familiares</div>';
  h+='<div class="hint" style="margin-bottom:8px">Rellena los familiares que apliquen. Antecedentes = dificultades de habla, lectura, escritura, atención, discalculia…</div>';
  for(const [mk,ml] of FAMILY_MEMBERS){
    h+=`<div class="card" style="padding:10px;margin-bottom:8px"><b style="font-size:13px">${esc(ml)}</b><div class="form-grid" style="margin-top:6px">
      <div class="field"><label>Nombre</label><input class="inp" id="fam_${mk}_nombre"></div>
      <div class="field"><label>Edad</label><input class="inp" id="fam_${mk}_edad"></div>
      <div class="field"><label>Profesión / curso</label><input class="inp" id="fam_${mk}_prof"></div>
      <div class="field full"><label>Antecedentes</label><input class="inp" id="fam_${mk}_ant"></div>
    </div></div>`;
  }
  for(const sec of ANAMNESIS){
    h+=`<div class="sec-title" style="margin-top:16px">${esc(sec.t)}</div>`;
    for(const [k,l] of sec.f) h+=`<div class="field"><label>${esc(l)}</label><input class="inp" id="an_${k}"></div>`;
  }
  h+='<div class="sec-title" style="margin-top:16px">Información relevante</div><div class="field"><textarea class="inp" id="an_relevante" placeholder="Cualquier otra información que considere relevante sobre su hijo/a"></textarea></div>';
  return h;
}
function collectAnamnesis(root){
  const g=id=>{ const e=$('#'+id,root); return e?e.value.trim():''; };
  const family={}; for(const [mk] of FAMILY_MEMBERS) family[mk]={nombre:g('fam_'+mk+'_nombre'),edad:g('fam_'+mk+'_edad'),prof:g('fam_'+mk+'_prof'),ant:g('fam_'+mk+'_ant')};
  const answers={}; for(const sec of ANAMNESIS) for(const [k] of sec.f) answers[k]=g('an_'+k);
  answers.relevante=g('an_relevante'); answers.referral=g('k_referral');
  const fn=g('k_fisc_name'), fa=g('k_fisc_addr'); if(fn)answers.fisc_name=fn; if(fa)answers.fisc_addr=fa;
  return {family,answers};
}
function anamnesisReportHTML(p,data){
  const A=(data&&data.answers)||{}, F=(data&&data.family)||{};
  const row=(l,v)=>`<div style="margin:2px 0"><b>${esc(l)}:</b> ${esc(v||'—')}</div>`;
  let h=`<div style="margin-bottom:10px">${row('Paciente',p.name)}${row('Fecha de nacimiento',p.birth?fmtDate(p.birth):'')}${row('Curso',p.grade)}${row('Centro escolar',p.school)}${A.referral?row('¿Cómo nos ha conocido?',A.referral):''}</div>`;
  h+='<div style="font-weight:700;margin:12px 0 4px">Datos familiares</div>';
  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr><th style="border:1px solid #999;padding:4px;background:#f2f2f0"></th>'+FAMILY_MEMBERS.map(([mk,ml])=>`<th style="border:1px solid #999;padding:4px;background:#f2f2f0">${esc(ml)}</th>`).join('')+'</tr></thead><tbody>';
  for(const [rk,rl] of FAMILY_ROWS){ h+=`<tr><td style="border:1px solid #999;padding:4px;font-weight:600">${esc(rl)}</td>`+FAMILY_MEMBERS.map(([mk])=>`<td style="border:1px solid #999;padding:4px">${esc((F[mk]||{})[rk]||'')}</td>`).join('')+'</tr>'; }
  h+='</tbody></table></div>';
  for(const sec of ANAMNESIS){ h+=`<div style="font-weight:700;margin:14px 0 4px">${esc(sec.t)}</div>`; for(const [k,l] of sec.f) h+=row(l,A[k]); }
  if(A.fisc_name||A.fisc_addr){ h+='<div style="font-weight:700;margin:14px 0 4px">Facturación</div>'; if(A.fisc_name)h+=row('Nombre/razón social',A.fisc_name); if(A.fisc_addr)h+=row('Dirección fiscal',A.fisc_addr); }
  if(A.relevante){ h+='<div style="font-weight:700;margin:14px 0 4px">Información relevante</div><div style="white-space:pre-wrap">'+esc(A.relevante)+'</div>'; }
  return h;
}

function renderIntakeForm(){
  $('#sidebar').style.display='none'; $('#bottomnav').style.display='none';
  const anon = window.supabase ? window.supabase.createClient(SB_URL, SB_KEY) : null;
  const c=Config.get(); const wrap=$('#main');
  const thanks=()=>{ wrap.innerHTML=`<div style="max-width:520px;margin:12vh auto 0;text-align:center;padding:24px">
      ${brandImg(260)}
      <div class="card" style="margin-top:18px"><div style="font-size:42px;color:var(--green)">✓</div>
      <h2 style="margin:6px 0">¡Gracias!</h2>
      <p class="muted">Hemos recibido la ficha correctamente. Nos pondremos en contacto contigo.</p></div></div>`; };
  wrap.innerHTML=`<div style="max-width:660px;margin:14px auto 0;padding:16px 18px 90px">
    <div style="text-align:center;margin-bottom:12px">${brandImg(240)}</div>
    <h1 style="font-size:22px;text-align:center">Cuestionario inicial</h1>
    <p class="muted" style="text-align:center;font-size:13px;margin:6px 0 8px">Con el fin de mejorar la atención, responde a estas cuestiones sobre el/la menor. Puedes añadir cualquier aclaración.</p>
    <div class="card">
      <div class="sec-title">Datos del niño/a</div>
      <div class="form-grid">
        <div class="field full"><label>Nombre y apellidos *</label><input class="inp" id="k_name"></div>
        <div class="field"><label>Fecha de nacimiento</label><input class="inp" id="k_birth" type="date"></div>
        <div class="field"><label>Curso</label><input class="inp" id="k_grade"></div>
        <div class="field full"><label>Centro escolar</label><input class="inp" id="k_school"></div>
      </div>
      <div class="sec-title" style="margin-top:14px">Persona de contacto</div>
      <div class="form-grid">
        <div class="field"><label>Padre/madre/tutor que rellena *</label><input class="inp" id="k_tutor"></div>
        <div class="field"><label>Teléfono *</label><input class="inp" id="k_phone" type="tel"></div>
        <div class="field"><label>Email</label><input class="inp" id="k_email" type="email"></div>
        <div class="field"><label>¿Cómo nos ha conocido?</label><input class="inp" id="k_referral"></div>
        <div class="field full"><label>Dirección</label><input class="inp" id="k_addr"></div>
      </div>
      ${anamnesisFormHTML()}
      <div class="sec-title" style="margin-top:16px">Datos de facturación</div>
      <div class="hint" style="margin-bottom:8px">Para emitir las facturas de las sesiones (el importe lo fijamos nosotros).</div>
      <div class="form-grid">
        <div class="field full"><label>Nombre/razón social para factura (si distinto del tutor)</label><input class="inp" id="k_fisc_name"></div>
        <div class="field"><label>NIF / CIF</label><input class="inp" id="k_dni"></div>
        <div class="field"><label>Dirección fiscal (si distinta)</label><input class="inp" id="k_fisc_addr"></div>
      </div>
      <label style="display:flex;gap:9px;align-items:flex-start;margin-top:14px;font-size:12.5px">
        <input type="checkbox" id="k_consent" style="margin-top:3px">
        <span>Consiento el tratamiento de estos datos, incluidos los del menor, por ${esc(c.pro_name||'el/la profesional')} con la finalidad de prestar el servicio de logopedia, conforme al RGPD (Ley Orgánica 3/2018 y Reglamento UE 2016/679). *</span></label>
      <div id="k_err" style="color:var(--red);font-size:12px;min-height:15px;margin-top:8px"></div>
      <button class="btn primary lg" id="k_send" style="width:100%">Enviar ficha</button>
    </div>
    <div class="muted" style="text-align:center;font-size:11px;margin-top:14px">${esc(c.clinic_name||'')}</div>
  </div>`;
  $('#k_send',wrap).onclick=async()=>{
    const name=$('#k_name').value.trim(), tutor=$('#k_tutor').value.trim(), phone=$('#k_phone').value.trim();
    if(!name||!tutor||!phone){ $('#k_err').textContent='Completa al menos nombre del menor, tutor y teléfono.'; return; }
    if(!$('#k_consent').checked){ $('#k_err').textContent='Debes aceptar el consentimiento para continuar.'; return; }
    const anam=collectAnamnesis(wrap);
    const rec={ id:uid(), name, birth:$('#k_birth').value||null, school:$('#k_school').value.trim(), grade:$('#k_grade').value.trim(),
      diagnosis:anam.answers.mc_preocupa||'', tutor, phone, email:$('#k_email').value.trim(), dni:$('#k_dni').value.trim(),
      address:$('#k_addr').value.trim(), notes:JSON.stringify(anam), consent:true, status:'pending', created_at:nowISO() };
    const b=$('#k_send'); b.disabled=true; b.textContent='Enviando…';
    try{ if(!anon) throw new Error('sin conexión'); const {error}=await anon.from('intake').insert(rec); if(error) throw new Error(error.message); thanks(); }
    catch(e){ b.disabled=false; b.textContent='Enviar ficha'; $('#k_err').textContent='No se pudo enviar: '+(e.message||e); }
  };
}

/* ---------- Bandeja de altas pendientes (revisión) ---------- */
Pages.intake = (el)=>{
  const draw=()=>{
    const rows=Intake.where(i=>i.status==='pending').sort((a,b)=>(b.created_at||'').localeCompare(a.created_at||''));
    $('#ik-body').innerHTML = rows.length?rows.map(i=>`
      <tr>
        <td><b>${esc(i.name)}</b>${i.diagnosis?`<div class="muted" style="font-size:12px">${esc(i.diagnosis)}</div>`:''}</td>
        <td class="hide-sm">${esc(i.tutor||'')}</td>
        <td>${i.phone?`<a href="tel:${esc(i.phone)}">${esc(i.phone)}</a>`:''}</td>
        <td class="hide-sm muted">${fmtDate(i.created_at)}</td>
        <td style="text-align:right"><button class="btn sm primary" data-rev="${i.id}">Revisar y crear</button>
        <button class="btn sm ghost danger" data-del="${i.id}">×</button></td>
      </tr>`).join(''):`<tr><td colspan="5"><div class="empty"><span class="em">📥</span>No hay altas pendientes</div></td></tr>`;
    $$('[data-rev]',el).forEach(b=>b.onclick=()=>{ const i=Intake.get(b.dataset.rev);
      let anam=null; try{ anam=JSON.parse(i.notes||'null'); }catch{}
      const relevante=(anam&&anam.answers&&anam.answers.relevante)||((typeof i.notes==='string'&&i.notes&&i.notes[0]!=='{')?i.notes:'');
      const report= anam ? {type:'anamnesis', title:'Anamnesis / Informe inicial · '+(i.name||''), content:anamnesisReportHTML({name:i.name,birth:i.birth,grade:i.grade,school:i.school}, anam)} : null;
      patientForm({name:i.name,birth:i.birth,diagnosis:i.diagnosis,school:i.school,grade:i.grade,tutor:i.tutor,phone:i.phone,email:i.email,dni:i.dni,address:i.address,notes:relevante}, {intakeId:i.id, report}); });
    $$('[data-del]',el).forEach(b=>b.onclick=()=>{ if(confirm('¿Descartar esta alta pendiente?')){ Intake.remove(b.dataset.del); draw(); App.renderSidebar(); } });
  };
  el.innerHTML=`<div class="page">
    <div class="page-head"><div><h1>Altas pendientes</h1><div class="sub">Fichas enviadas por las familias · falta añadir el importe al crearlas</div></div>
      <div class="actions"><button class="btn primary" data-share>🔗 Compartir formulario</button></div></div>
    <div class="card" style="padding:0;overflow:hidden"><table class="table">
      <thead><tr><th>Paciente</th><th class="hide-sm">Tutor</th><th>Teléfono</th><th class="hide-sm">Recibido</th><th></th></tr></thead>
      <tbody id="ik-body"></tbody></table></div>
    <div class="hint" style="margin-top:10px">Enlace del formulario: <code>${esc(location.origin+location.pathname)}?intake=1</code></div>
  </div>`;
  draw();
  $('[data-share]',el).onclick=async()=>{
    const url=location.origin+location.pathname+'?intake=1';
    const text='Hola 👋 Para daros de alta en el gabinete, rellenad esta breve ficha del paciente, por favor:\n'+url;
    if(navigator.share){ try{ await navigator.share({title:'Ficha de alta · Logopedia',text,url}); return; }catch(e){ if(e.name==='AbortError') return; } }
    try{ await navigator.clipboard.writeText(url); toast('Enlace copiado ✓','ok'); }catch{ prompt('Copia el enlace del formulario:',url); }
  };
};

/* ============================================================
   ARRANQUE
   ============================================================ */
$('#nav-backdrop').onclick=closeDrawer;
(async()=>{
  // Modo formulario público para familias (sin login, sin acceso a datos)
  if(/[?&]intake\b/.test(location.search)){ renderIntakeForm(); return; }
  $('#main').innerHTML='<div class="page" style="text-align:center;padding-top:120px;color:var(--text-soft)"><div class="spin dark" style="width:28px;height:28px;margin:0 auto 14px"></div>Conectando…</div>';
  const st = await DB.boot();
  if(st==='login'){ showLogin(); return; }
  if(st==='offline'){ toast('Sin conexión — modo local','err'); }
  if(DB.isRemote()) seedHolidaysValencia();
  App.navigate('dashboard');
})();
</script>
